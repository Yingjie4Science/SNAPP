# Central configuration for the SNAPP Urban Mental Health pipeline.
# Single source of truth for parameters shared across scripts. Scripts fall back
# to their own defaults if this file or PyYAML is unavailable.

project:
  crs_sf: "EPSG:26910"        # San Francisco (NAD83 / UTM 10N, meters)
  crs_national: "EPSG:5070"   # CONUS Albers (meters) for the national run
  aoi_sf_bbox: [-122.55, 37.70, -122.35, 37.83]   # W, S, E, N (WGS84)

model:
  # Residential greenness exposure radius (meters). The source evidence is a
  # meta-analysis pooling studies at 250-1000 m buffers; 300 m is a central,
  # commonly-studied neighborhood distance. See docs/effect_size.md (radius).
  search_radius_m: 300
  # Exposure-response as a RISK RATIO per +0.1 NDVI, which is what InVEST expects.
  # The published source is an ODDS RATIO (Liu et al. 2023 meta-analysis,
  # OR 0.931, 95% CI 0.887-0.977 per +0.1 NDVI, depression). Converted OR->RR at
  # baseline risk p0 via src/inputs/effect_size.py (Zhang & Yu 1998). Recompute
  # with effect_size.py if you change p0. Full detail: docs/effect_size.md.
  effect_size: 0.944          # RR central (OR 0.931 at p0=0.204); derived by compute_p0.py
  effect_size_low: 0.908      # RR bound (OR 0.887 = more protective)
  effect_size_high: 0.982     # RR bound (OR 0.977 = least protective)
  # Published odds ratios + p0, kept for provenance / recomputation:
  effect_size_or: 0.931
  effect_size_or_low: 0.887
  effect_size_or_high: 0.977
  baseline_risk_p0: 0.204      # population-weighted PLACES prevalence (compute_p0.py)
  model_option: "ndvi"        # 'ndvi' or 'lulc'

population:
  # Prevalence is for adults (>=18) but WorldPop counts all ages, so scale the
  # population to adults. SF ~0.86 adults; US ~0.78. Set 1.0 to disable.
  adult_fraction: 0.86

cost:
  basis: "societal"           # 'societal' (pooled Greenberg) or 'direct' (MEPS)
  anchor: "pooled"            # 'pooled' | 'greenberg2018' | 'greenberg2019'
  target_year: 2024
  low_usd: 17000
  central_usd: 21280
  high_usd: 23000

scenario:
  mode: "uniform"             # 'uniform' or 'greenable'
  delta: 0.05                 # NDVI increase
  cap: 0.90                   # max NDVI after greening
  target: 0.60                # greenable mode: only raise pixels below this

# Investment scenarios compared by run_scenarios.py (label -> ndvi_alt filename
# in inputs/).  They share the same epidemiologic and valuation assumptions;
# only the spatial greening rule changes.  Missing rasters are skipped.
scenarios:
  uniform_005: "ndvi_scenario.tif"                  # reference: +0.05 everywhere
  greenable_005: "ndvi_scenario_greenable.tif"       # +0.05 only below NDVI 0.60
  lulc_masked: "ndvi_scenario_lulc.tif"
  canopy_30pct: "ndvi_scenario_canopy.tif"           # tract means reach 30% canopy-equivalent NDVI
  best_potential_p95: "ndvi_scenario_bestpot.tif"     # level up to this city's own p95 NDVI
  health_priority_feasible: "ndvi_scenario_health_priority.tif"
  equity_priority_feasible: "ndvi_scenario_equity_priority.tif"
  balanced_priority_feasible: "ndvi_scenario_balanced_priority.tif"

advanced_equity:
  bootstrap_draws: 400
  spatial_permutations: 499
  allocation_budget_fraction: 0.50  # matched share of feasible LULC potential

# City reference figures, for contextualizing results (cases vs population, cost
# vs GDP). Per-place — update when analyzing another city.
context:
  city_name: "San Francisco"
  population_total: 830235       # SF city/county, 2024 Census est.
  population_adult: 716727       # 18+, 2024 Census est.
  gdp_usd: 250000000000          # SF County all-industries GDP, ~2023 BEA
                                 # (FRED GDPALL06075); APPROXIMATE — refine with exact value.

inputs:                        # filenames under data/urban-mental-health/inputs/
  ndvi_base: "ndvi_base.tif"
  ndvi_alt: "ndvi_scenario.tif"
  aoi: "aoi.gpkg"
  prevalence: "baseline_prevalence.gpkg"
  population: "population.tif"
